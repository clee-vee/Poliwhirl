<html lang="en">
<head>

<title>Poliwhirl Card Checklist · collecting, softly</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F8F8F3;--text:#68635D;--accent:#A7B4C2;
  --muted:#AEACA6;--border:#D4D3C6;--dark:#595C64;--white:#fff;
}
body{background:var(--bg);color:var(--text);font-family:'Raleway',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
.page{max-width:880px;margin:0 auto;padding:40px 24px 80px;}
.header{text-align:center;padding:36px 0 28px;}
.title{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;line-height:1.1;color:var(--text);}
.title em{font-style:italic;}
.handle{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:10px;}
.tagline{font-size:12px;font-weight:300;color:var(--muted);margin-top:10px;line-height:1.8;}
.divider{height:0.5px;background:var(--border);margin:24px 0;}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:24px 0 32px;}
.stat{background:var(--white);border:0.5px solid var(--border);border-radius:8px;padding:12px 22px;text-align:center;min-width:90px;}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--text);line-height:1;}
.stat-l{font-size:8px;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.controls input,.controls select{height:36px;border:0.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);font-family:'Raleway',sans-serif;font-size:12px;font-weight:300;padding:0 12px;outline:none;}
.controls input{flex:1;min-width:180px;}
.controls input::placeholder{color:var(--muted);}
.controls select{cursor:pointer;}
.btn{height:36px;padding:0 16px;border:0.5px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);font-family:'Raleway',sans-serif;font-size:11px;font-weight:400;cursor:pointer;letter-spacing:0.5px;white-space:nowrap;}
.btn:hover{background:var(--bg);}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;align-items:center;}
.leg{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-nh{background:var(--border);}
.dot-h{background:var(--accent);}
.dot-rh{background:var(--muted);}
.dot-ir{background:#C4A882;}
.badge{font-size:9px;letter-spacing:1px;padding:2px 7px;border-radius:20px;border:0.5px solid var(--border);color:var(--muted);}
.badge-jp{border-color:var(--accent);color:var(--accent);}
.era-block{margin-bottom:36px;}
.era-label{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);font-weight:400;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.era-label::after{content:'';flex:1;height:0.5px;background:var(--border);}
.tbl-wrap{border:0.5px solid var(--border);border-radius:8px;overflow:hidden;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead th{font-size:8px;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);font-weight:400;padding:8px 12px;text-align:left;background:var(--bg);border-bottom:0.5px solid var(--border);}
tbody tr{border-bottom:0.5px solid var(--border);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(167,180,194,0.06);}
td{padding:10px 12px;font-size:12px;font-weight:300;color:var(--text);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td.nm{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;white-space:normal;}
